name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: find . -type f -name '*.go' -not -path './vendor/*' -exec gofmt -l {} + | tee /tmp/friday-gofmt.txt >/dev/null; test ! -s /tmp/friday-gofmt.txt

      - name: Run tests
        run: go test ./...

      - name: Build
        run: go build ./...
