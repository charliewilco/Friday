name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: find . -type f -name '*.go' -not -path './vendor/*' -exec gofmt -l {} + | tee /tmp/friday-gofmt.txt >/dev/null; test ! -s /tmp/friday-gofmt.txt

      - name: Run tests
        run: go test ./...

      - name: Build
        run: go build ./...

  live-ollama-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh

      - name: Start Ollama
        run: |
          export OLLAMA_HOST=127.0.0.1:11435
          nohup ollama serve > /tmp/ollama.log 2>&1 &
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:11435/api/tags >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Ollama failed to start"
          cat /tmp/ollama.log
          exit 1

      - name: Pull smoke test models
        run: |
          export OLLAMA_HOST=127.0.0.1:11435
          ollama pull smollm2:135m
          ollama pull all-minilm

      - name: Run live Ollama smoke test
        env:
          FRIDAY_LIVE_OLLAMA: "1"
          FRIDAY_LIVE_OLLAMA_HOST: http://127.0.0.1:11435
          FRIDAY_LIVE_OLLAMA_CHAT_MODEL: smollm2:135m
          FRIDAY_LIVE_OLLAMA_EMBED_MODEL: all-minilm
        run: go test ./internal/ollama -run TestClientLiveOllama -v

      - name: Show Ollama logs on failure
        if: failure()
        run: cat /tmp/ollama.log
